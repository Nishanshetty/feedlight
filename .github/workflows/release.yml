name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

# Cancel an in-progress build when new commits are pushed to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS universal binary
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (universal binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:
          # Release tags build the full DMG for distribution; routine main/PR
          # builds only produce the .app — this skips the flaky bundle_dmg.sh
          # step (AppleScript/hdiutil races on headless runners) so CI stays green.
          args: >-
            ${{ startsWith(github.ref, 'refs/tags/')
                && '--target universal-apple-darwin'
                || '--target universal-apple-darwin --bundles app' }}
          # On version tags, publish a GitHub Release with the .dmg attached.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag }}
          releaseName: Feedlight ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for what changed in this release.
          releaseDraft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          prerelease: false

      - name: Upload .app artifact (non-tag builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: Feedlight-macOS-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: ignore
          retention-days: 14
